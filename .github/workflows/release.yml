name: Release the CLI

# WORKFLOW B (PRD §4.16 / PLAN §P24). Reacts to a version TAG; the tag name is INJECTED as the version at
# build time (no committed version constant), then builds the native CLI for every shipped RID, publishes a
# GitHub Release with all archives, packs + pushes the multi-RID MintPlayer.Polyglot.MSBuild NuGet, and
# publishes the four target plugins to npm — all at the tag version. Shipping set: win-x64, linux-x64,
# linux-arm64, osx-x64, osx-arm64 (PRD §4.14).
#
# Topology:
#   version                computes ver/tag from the tag ref (or the dispatch input) + validates the shape
#   build-windows          MSBuild v145 (VS 2026), /p:PolyglotVersion → polyglot-win-x64.zip + provenance
#   build-linux (matrix)   CMake/g++, -DPOLYGLOT_VERSION → polyglot-<rid>.tar.gz + provenance
#   build-macos (matrix)   CMake/clang, -DPOLYGLOT_VERSION → polyglot-osx-<arch>.tar.gz (ad-hoc signed) + provenance
#   github-release (fan-in) attaches every archive to a GitHub Release at the tag
#   nuget          (fan-in) lays out tools/<rid>/, packs with -p:Version, pushes
#   plugins                 stamps each @mintplayer/polyglot-target-* to the tag version + publishes to npm
#
# Provenance: actions/attest-build-provenance binds each artifact's sha256 to THIS repo/workflow/run/commit
# (Sigstore/SLSA). Verify: gh attestation verify <archive-or-binary> --repo MintPlayer/MintPlayer.Polyglot.
#
# Trigger: a version tag push (`git tag v0.5.0 && git push origin v0.5.0`), OR — the normal path — Workflow A
# (auto-tag.yml) `gh workflow run`s this with --ref <tag> (workflow_dispatch is the exception to GitHub's
# GITHUB_TOKEN no-recursion rule, so A needs no PAT/App). A manual UI dispatch on a branch must pass `version`.

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release, e.g. 0.5.0 (only needed when dispatching on a branch, not with --ref <tag>)'
        required: false

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  version:
    runs-on: ubuntu-latest
    outputs:
      ver: ${{ steps.v.outputs.ver }}
      tag: ${{ steps.v.outputs.tag }}
    steps:
      - name: Resolve + validate the release version
        id: v
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            ver="${GITHUB_REF_NAME#v}"                       # tag push, or A's dispatch with --ref <tag>
          elif [[ -n "${{ inputs.version }}" ]]; then
            ver="${{ inputs.version }}"; ver="${ver#v}"      # manual branch dispatch
          else
            echo "::error::dispatched on a branch without a 'version' input (or use --ref <tag>)"; exit 1
          fi
          if ! echo "$ver" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.]+)?$'; then
            echo "::error::invalid version '$ver' — want MAJOR.MINOR.PATCH[-prerelease], no +build"; exit 1
          fi
          echo "ver=$ver" >> "$GITHUB_OUTPUT"
          echo "tag=v$ver" >> "$GITHUB_OUTPUT"
          echo "Releasing $ver (tag v$ver)"

  build-windows:
    needs: version
    runs-on: windows-latest
    permissions:
      id-token: write     # Sigstore OIDC identity for signing the attestation
      attestations: write # store the attestation in the repo's attestation registry
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Locate a VS 2026 (v145) MSBuild
        id: msbuild
        shell: pwsh
        run: |
          $vswhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
          $msbuild = & $vswhere -latest -prerelease -version '[18.0,)' -requires Microsoft.Component.MSBuild -find 'MSBuild\**\Bin\MSBuild.exe' | Select-Object -First 1
          if (-not $msbuild) { Write-Error "No VS 2026 (v145-capable) MSBuild on this runner."; exit 1 }
          "path=$msbuild" >> $env:GITHUB_OUTPUT

      - name: Build the native CLI (Release x64, version injected)
        shell: pwsh
        run: |
          & "${{ steps.msbuild.outputs.path }}" MintPlayer.Polyglot.sln /p:Configuration=Release /p:Platform=x64 /p:PolyglotVersion=${{ needs.version.outputs.ver }} /m
          if ($LASTEXITCODE -ne 0) { exit 1 }
          # MSBuild exit codes have lied before - prove the exe runs AND reports the injected version.
          $v = (x64\Release\MintPlayer.Polyglot.Cli.exe --version).Trim()
          if ($v -ne "${{ needs.version.outputs.ver }}") { Write-Error "version injection failed: got '$v'"; exit 1 }

      - name: Gate - unit tests
        shell: pwsh
        run: x64\Release\MintPlayer.Polyglot.Tests.exe

      # The conformance runner compiles its C# oracle against net10.0 - pin the SDK.
      - name: Set up .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      # run-diff runs the emitted TS via Node's type-stripping (incl. multi-module linked programs, which
      # import sibling `.ts` files) - pin Node instead of trusting the runner image (matches build-linux).
      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Gate - differential conformance (C# vs TS)
        shell: pwsh
        run: pwsh tests/conformance/run-diff.ps1 -Cli x64/Release/MintPlayer.Polyglot.Cli.exe

      - name: Stage and zip (polyglot.exe + plugins)
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force stage | Out-Null
          Copy-Item x64\Release\MintPlayer.Polyglot.Cli.exe stage\polyglot.exe
          Copy-Item -Recurse x64\Release\plugins stage\plugins
          Compress-Archive -Path stage\* -DestinationPath polyglot-win-x64.zip
          $names = (Get-ChildItem stage\plugins -Directory).Name -join ','
          if (-not $names) { Write-Error "staging produced no plugins - the zip would be a CLI with zero targets"; exit 1 }
          Write-Host "staged win-x64 CLI with plugins: $names"

      - name: Attest build provenance (zip + exe)
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: |
            polyglot-win-x64.zip
            stage/polyglot.exe

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: polyglot-win-x64
          path: polyglot-win-x64.zip
          if-no-files-found: error

  build-linux:
    needs: version
    strategy:
      fail-fast: false
      matrix:
        include:
          - rid: linux-x64
            runs-on: ubuntu-22.04     # glibc 2.35 floor (PRD §4.14)
            full_gates: true          # the shipping-critical RID: run the differential too
          - rid: linux-arm64
            runs-on: ubuntu-22.04-arm  # native ARM64 runner (GA + free for public repos)
            full_gates: false          # build + unit + smoke only (differential is arch-independent)
    runs-on: ${{ matrix.runs-on }}
    permissions:
      id-token: write
      attestations: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install toolchain (cmake, g++)
        run: sudo apt-get update -qq && sudo apt-get install -y -qq cmake g++

      - name: Build the native CLI (CMake, Release, version injected)
        run: |
          cmake -S . -B build -DCMAKE_BUILD_TYPE=Release -DPOLYGLOT_VERSION=${{ needs.version.outputs.ver }}
          cmake --build build -j"$(nproc)"
          v="$(./build/polyglot --version | tr -d '[:space:]')"
          [ "$v" = "${{ needs.version.outputs.ver }}" ] || { echo "::error::version injection failed: got '$v'"; exit 1; }

      - name: Gate - unit tests
        run: ./build/polyglot-tests

      - name: Gate - smoke transpile (plugins found next to the binary, not cwd)
        run: |
          printf 'fn main() {\n  print(6 * 7)\n}\n' > /tmp/smoke.pg
          (cd /tmp && "$GITHUB_WORKSPACE/build/polyglot" build /tmp/smoke.pg --target csharp --out /tmp/ --lib io)
          grep -q 'print(6 \* 7)' /tmp/smoke.cs

      - name: Set up .NET 10
        if: matrix.full_gates
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Set up Node 22 (TS type-stripping for the differential)
        if: matrix.full_gates
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Gate - differential conformance (C# vs TS)
        if: matrix.full_gates
        run: pwsh tests/conformance/run-diff.ps1 -Cli ./build/polyglot

      - name: Package (tar.gz preserves the +x bit)
        run: tar czf "polyglot-${{ matrix.rid }}.tar.gz" -C build polyglot plugins

      - name: Attest build provenance (tarball + binary)
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: |
            polyglot-${{ matrix.rid }}.tar.gz
            build/polyglot

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: polyglot-${{ matrix.rid }}
          path: polyglot-${{ matrix.rid }}.tar.gz
          if-no-files-found: error

  build-macos:
    needs: version
    # Both macOS slices build on the Apple-Silicon runner: GitHub's Intel `macos-13` runners are retired/scarce
    # (jobs queue with no runner). clang here CROSS-COMPILES the x86_64 slice from the universal SDK via
    # -DCMAKE_OSX_ARCHITECTURES. The arm64 job runs the gates natively; the transpiler's output is
    # arch-independent, so per-arch test coverage is redundant — the x64 slice is gated by proxy + an arch
    # assertion. (A universal `lipo` binary is the recorded future alternative — PRD §4.14.)
    strategy:
      fail-fast: false
      matrix:
        include:
          - rid: osx-arm64
            arch: arm64
            native: true      # runs on its own arch → full gates
          - rid: osx-x64
            arch: x86_64
            native: false     # cross-compiled → build + arch-verify + package only
    runs-on: macos-14         # Apple Silicon
    permissions:
      id-token: write
      attestations: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # clang ships with the Xcode Command Line Tools (preinstalled); cmake is preinstalled on the images but
      # install it if a future image drops it. CMakeLists.txt already pins CMAKE_OSX_DEPLOYMENT_TARGET=13.0.
      - name: Ensure cmake
        run: cmake --version || brew install cmake

      - name: Build the native CLI (CMake, Release, version injected, arch=${{ matrix.arch }})
        run: |
          cmake -S . -B build -DCMAKE_BUILD_TYPE=Release -DPOLYGLOT_VERSION=${{ needs.version.outputs.ver }} -DCMAKE_OSX_ARCHITECTURES=${{ matrix.arch }}
          cmake --build build -j"$(sysctl -n hw.ncpu)"

      - name: Verify the built binary's architecture
        run: |
          file build/polyglot
          got="$(lipo -archs build/polyglot | tr -d '[:space:]')"
          [ "$got" = "${{ matrix.arch }}" ] || { echo "::error::expected ${{ matrix.arch }}, built '$got'"; exit 1; }

      - name: Gate - version + unit tests + smoke (native arch only)
        if: matrix.native
        run: |
          v="$(./build/polyglot --version | tr -d '[:space:]')"
          [ "$v" = "${{ needs.version.outputs.ver }}" ] || { echo "::error::version injection failed: got '$v'"; exit 1; }
          ./build/polyglot-tests
          printf 'fn main() {\n  print(6 * 7)\n}\n' > /tmp/smoke.pg
          (cd /tmp && "$GITHUB_WORKSPACE/build/polyglot" build /tmp/smoke.pg --target csharp --out /tmp/ --lib io)
          grep -q 'print(6 \* 7)' /tmp/smoke.cs

      # Apple Silicon refuses to run an unsigned binary; a native link is already ad-hoc signed, but re-sign
      # explicitly so a downloaded/tar-extracted binary is guaranteed valid (arch-agnostic). The extension
      # additionally strips the com.apple.quarantine xattr on activation (no Developer-ID cert / notarization).
      - name: Ad-hoc codesign
        run: codesign --force --sign - build/polyglot

      - name: Package (tar.gz preserves the +x bit and the signature)
        run: tar czf "polyglot-${{ matrix.rid }}.tar.gz" -C build polyglot plugins

      - name: Attest build provenance (tarball + binary)
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: |
            polyglot-${{ matrix.rid }}.tar.gz
            build/polyglot

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: polyglot-${{ matrix.rid }}
          path: polyglot-${{ matrix.rid }}.tar.gz
          if-no-files-found: error

  github-release:
    needs: [version, build-windows, build-linux, build-macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write     # create the release (and, on a branch dispatch, its tag)
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: polyglot-*

      - name: Create the GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.version.outputs.tag }}
        run: |
          shopt -s globstar nullglob
          archives=(dist/**/polyglot-*.zip dist/**/polyglot-*.tar.gz)
          if [[ ${#archives[@]} -eq 0 ]]; then echo "::error::no archives to release"; exit 1; fi
          # --repo is required: this job downloads artifacts only (no checkout), so gh has no git remote.
          args=(--repo "${{ github.repository }}" --title "polyglot $TAG" --generate-notes)
          # When dispatched on a branch the tag doesn't exist yet — create it at this SHA. When run at a tag
          # ref (tag push, or A's --ref <tag> dispatch) the tag already exists and gh uses it.
          if [[ "${{ github.ref }}" != refs/tags/* ]]; then args+=(--target "${{ github.sha }}"); fi
          gh release create "$TAG" "${archives[@]}" "${args[@]}"

  nuget:
    needs: [version, build-windows, build-linux, build-macos]
    runs-on: ubuntu-latest
    permissions:
      packages: write     # push to GitHub Packages
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: polyglot-*

      - name: Lay out tools/<rid>/ staging tree
        run: |
          set -euo pipefail
          mkdir -p staging/win-x64
          unzip -o dist/polyglot-win-x64/polyglot-win-x64.zip -d staging/win-x64
          for rid in linux-x64 linux-arm64 osx-x64 osx-arm64; do
            mkdir -p "staging/$rid"
            tar xzf "dist/polyglot-$rid/polyglot-$rid.tar.gz" -C "staging/$rid"
          done
          echo "== staged tree ==" && find staging -maxdepth 2 -type d | sort

      - name: Pack the multi-RID NuGet (version injected)
        run: dotnet pack src/MintPlayer.Polyglot.MSBuild -c Release -o artifacts -p:Version=${{ needs.version.outputs.ver }} "-p:PolyglotStageRoot=$GITHUB_WORKSPACE/staging"

      - name: Push to nuget.org
        run: dotnet nuget push artifacts/*.nupkg --source https://api.nuget.org/v3/index.json --api-key "${{ secrets.PUBLISH_TO_NUGET_ORG }}" --skip-duplicate

      - name: Push to GitHub Packages
        run: dotnet nuget push artifacts/*.nupkg --source https://nuget.pkg.github.com/MintPlayer/index.json --api-key "${{ github.token }}" --skip-duplicate

  plugins:
    # The npm target plugins ship at the SAME version as the CLI that bundles them (lockstep, PRD §4.16) —
    # so `polyglot install <target>` resolves a plugin byte-equal to the one inside the CLI release archive.
    # (Formerly publish-plugins.yml on push-to-master; that cadence is retired in the P24 cutover.)
    needs: version
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # A plugin that fails strict JSON parsing or misses its required blocks must never publish —
      # the CLI's loadBackend enforces the full contract at install/load; this is the cheap pre-gate.
      - name: Validate plugin manifests
        run: |
          node -e '
            const fs = require("fs");
            let bad = 0;
            for (const t of fs.readdirSync("plugins")) {
              const f = `plugins/${t}/polyglot-plugin.json`;
              try {
                const m = JSON.parse(fs.readFileSync(f, "utf8"));
                for (const key of ["name", "spec", "rules"])
                  if (!(key in m)) throw new Error(`missing ${key}`);
                if (!("Program" in m.rules) || !("Type" in m.rules)) throw new Error("missing Program/Type rule");
                console.log(`${f}: ok (${Object.keys(m.rules).length} rules)`);
              } catch (e) { bad++; console.error(`INVALID ${f}: ${e.message}`); }
            }
            process.exit(bad ? 1 : 0);
          '

      - name: Stamp each plugin to the release version
        run: |
          for d in plugins/*/; do
            (cd "$d" && npm version "${{ needs.version.outputs.ver }}" --no-git-tag-version --allow-same-version)
          done

      # npmjs is published DIRECTLY: the shared publish action swallowed npmjs errors (diagnosed 2026-07-04);
      # a plain `npm publish` with the same token succeeds. Skips versions already live.
      - name: Publish target plugins to npmjs
        env:
          TOKEN: ${{ secrets.PUBLISH_TO_NPMJS }}
        run: |
          if [ -z "$TOKEN" ]; then echo "::error::PUBLISH_TO_NPMJS resolves EMPTY in this repo"; exit 1; fi
          echo "//registry.npmjs.org/:_authToken=$TOKEN" > ~/.npmrc
          fail=0
          for d in plugins/*/; do
            name=$(node -p "require('./$d/package.json').name")
            ver=$(node -p "require('./$d/package.json').version")
            if npm view "$name@$ver" version --registry=https://registry.npmjs.org >/dev/null 2>&1; then
              echo "skip: $name@$ver already on npmjs"
              continue
            fi
            (cd "$d" && npm publish --access public --registry=https://registry.npmjs.org) \
              || { echo "::error::npm publish failed for $name@$ver"; fail=1; }
          done
          exit $fail

      - name: Publish target plugins to GitHub Packages
        uses: MintPlayer/github-actions/publish-npm-packages@b08fbddf0b285a8633ac138b89d79ceb8cc8c888
        with:
          folder: plugins
          registries: |
            [
              { "url": "https://npm.pkg.github.com", "token": "${{ github.token }}" }
            ]
