name: PR checks (Linux build + unit tests)
# The PR-level compile gate this repo was missing (added after the P30 squash broke every POSIX
# release leg post-merge — run 29485382814): a single ubuntu cmake/g++ build + the unit suite,
# so platform-forked code (#ifdef transport, dlopen/popen, chrono/filesystem quirks) is compiled
# by a second toolchain BEFORE merge instead of first meeting g++ in the tag-triggered release.
# Deliberately ONE cheap leg (no macOS/Windows runners, no differential conformance — Windows is
# the local gate, the release run stays the full cross-platform proof). Same toolchain floor as
# release.yml's linux-x64 (ubuntu-22.04 = glibc 2.35, PRD §4.14).
on:
  pull_request:
    paths:
      - 'src/**'
      - 'tests/**'
      - 'plugins/**'
      - 'CMakeLists.txt'
      - '.github/workflows/ci.yml'
  workflow_dispatch:

jobs:
  linux-build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install toolchain (cmake, g++)
        run: sudo apt-get update -qq && sudo apt-get install -y -qq cmake g++

      - name: Build (CMake, Release)
        # POLYGLOT_VERSION pinned to the dev placeholder: the shallow PR checkout has no tags, so
        # CMake's `git describe --always` fallback would inject a bare commit SHA and fail the
        # version-shape unit test. A PR check has no version — say so explicitly.
        run: |
          cmake -S . -B build -DCMAKE_BUILD_TYPE=Release -DPOLYGLOT_VERSION=0.0.0-dev
          cmake --build build -j"$(nproc)"

      - name: Unit tests
        run: ./build/polyglot-tests

      - name: Smoke transpile (plugins found next to the binary, not cwd)
        run: |
          printf 'fn main() {\n  print(6 * 7)\n}\n' > /tmp/smoke.pg
          (cd /tmp && "$GITHUB_WORKSPACE/build/polyglot" build /tmp/smoke.pg --target csharp --out /tmp/ --lib io)
          grep -q 'print(6 \* 7)' /tmp/smoke.cs

      # The two PowerShell harness legs freeze the `#ifdef`-forked CLI code that broke every P30 POSIX
      # release leg (watch-mode polling + the registry auto-download HTTP transport) — exercised here on
      # g++/Linux BEFORE merge, not first in the tag-triggered release. pwsh + node are preinstalled on the
      # GitHub-hosted ubuntu runners; each runner takes -Cli so it targets the Linux binary.
      - name: Watch-mode protocol gate
        shell: pwsh
        run: ./tests/watch/run-watch.ps1 -Cli "$env:GITHUB_WORKSPACE/build/polyglot"

      - name: Registry auto-download gate (needs node — preinstalled)
        shell: pwsh
        run: ./tests/registry/run-registry.ps1 -Cli "$env:GITHUB_WORKSPACE/build/polyglot"

  # Wave-2 slice 7: C++ line coverage of the Core/CLI, report-only (no threshold until a baseline
  # exists). Unit suite + a four-target CLI transpile sweep of the conformance programs, so both the
  # front-end AND the emitter/rule-interpreter paths accumulate .gcda. What this deliberately does NOT
  # measure: the plugin JSON templates — their instrument is the differential conformance suite.
  coverage:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install toolchain (cmake, g++, gcovr)
        run: sudo apt-get update -qq && sudo apt-get install -y -qq cmake g++ gcovr

      - name: Build (Debug, --coverage)
        run: |
          cmake -S . -B build-cov -DCMAKE_BUILD_TYPE=Debug -DPOLYGLOT_VERSION=0.0.0-dev \
            -DCMAKE_CXX_FLAGS=--coverage -DCMAKE_EXE_LINKER_FLAGS=--coverage
          cmake --build build-cov -j"$(nproc)"

      - name: Unit tests (instrumented)
        run: ./build-cov/polyglot-tests

      - name: Conformance transpile sweep (instrumented CLI, all four targets)
        run: |
          mkdir -p /tmp/cov-out
          for t in csharp typescript python php; do
            for p in tests/conformance/programs/*.pg; do
              ./build-cov/polyglot build "$p" --target "$t" --lib io --out /tmp/cov-out >/dev/null 2>&1 || true
            done
          done

      - name: Coverage report (gcovr)
        run: |
          mkdir -p coverage-report
          gcovr --root . --filter 'src/' --print-summary \
            --html-details coverage-report/index.html --txt coverage-report/summary.txt
          { echo '### C++ coverage — Core + CLI (unit suite + conformance transpile sweep)';
            echo '```';
            cat coverage-report/summary.txt;
            echo '```'; } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload HTML report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage-report/
