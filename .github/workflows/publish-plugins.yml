# Publish the target-language plugins (P19: a language is a JSON file) as npm packages —
# @mintplayer/polyglot-target-{csharp,typescript,python,php} — to npmjs.org and GitHub Packages.
# `polyglot install <target>` resolves these by name. Mirrors the org publishing pattern;
# PUBLISH_TO_NPMJS is an org-wide secret.
#
# The MintPlayer.Polyglot.MSBuild NuGet is NO LONGER published here: it now embeds the native CLI for
# EVERY shipped RID (win-x64 + linux-x64 + linux-arm64), which only exist together in the release matrix,
# so it is packed + pushed by the `nuget` fan-in job in release.yml — i.e. NuGet is now tag-gated
# (package cadence = CLI release cadence). See PLAN §P22 slice 5.
name: publish-plugins

on:
  push:
    branches: [master]
    paths:
      - 'plugins/**'
      - 'src/**'
      - '.github/workflows/publish-plugins.yml'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # A plugin that fails strict JSON parsing or misses its required blocks must never publish —
      # the CLI's loadBackend enforces the full contract at install/load; this is the cheap pre-gate.
      - name: Validate plugin manifests
        run: |
          node -e '
            const fs = require("fs");
            let bad = 0;
            for (const t of fs.readdirSync("plugins")) {
              const f = `plugins/${t}/polyglot-plugin.json`;
              try {
                const m = JSON.parse(fs.readFileSync(f, "utf8"));
                for (const key of ["name", "spec", "rules"])
                  if (!(key in m)) throw new Error(`missing ${key}`);
                if (!("Program" in m.rules) || !("Type" in m.rules)) throw new Error("missing Program/Type rule");
                console.log(`${f}: ok (${Object.keys(m.rules).length} rules)`);
              } catch (e) { bad++; console.error(`INVALID ${f}: ${e.message}`); }
            }
            process.exit(bad ? 1 : 0);
          '

      # npmjs is published DIRECTLY: the shared publish action failed all npmjs publishes with its
      # error output swallowed, while a plain `npm publish` with the same token succeeds (diagnosed
      # 2026-07-04 — token valid, publishConfig.access already public). Skips versions already live.
      - name: Publish target plugins to npmjs
        env:
          TOKEN: ${{ secrets.PUBLISH_TO_NPMJS }}
        run: |
          if [ -z "$TOKEN" ]; then echo "::error::PUBLISH_TO_NPMJS resolves EMPTY in this repo"; exit 1; fi
          echo "//registry.npmjs.org/:_authToken=$TOKEN" > ~/.npmrc
          fail=0
          for d in plugins/*/; do
            name=$(node -p "require('./$d/package.json').name")
            ver=$(node -p "require('./$d/package.json').version")
            if npm view "$name@$ver" version --registry=https://registry.npmjs.org >/dev/null 2>&1; then
              echo "skip: $name@$ver already on npmjs"
              continue
            fi
            (cd "$d" && npm publish --access public --registry=https://registry.npmjs.org) \
              || { echo "::error::npm publish failed for $name@$ver"; fail=1; }
          done
          exit $fail

      - name: Publish target plugins to GitHub Packages
        uses: MintPlayer/github-actions/publish-npm-packages@b08fbddf0b285a8633ac138b89d79ceb8cc8c888
        with:
          folder: plugins
          registries: |
            [
              { "url": "https://npm.pkg.github.com", "token": "${{ github.token }}" }
            ]
