name: Validate plugins

# Plugin manifest PRE-GATE (PRD §4.16 / PLAN §P24). PUBLISHING moved to release.yml (Workflow B): the npm
# target plugins @mintplayer/polyglot-target-* now ship at the CLI's TAG version, in lockstep, so
# `polyglot install <target>` resolves a plugin byte-equal to the one inside the CLI release archive. The old
# push-to-master publish cadence is retired (it let npm drift ahead of the last CLI release). This workflow
# only VALIDATES the manifests so a broken plugin JSON is caught before merge — it never publishes.

on:
  pull_request:
    paths:
      - 'plugins/**'
      - 'src/**'
      - '.github/workflows/publish-plugins.yml'
  push:
    branches: [master]
    paths:
      - 'plugins/**'
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # A plugin that fails strict JSON parsing or misses its required blocks must never merge —
      # the CLI's loadBackend enforces the full contract at install/load; this is the cheap pre-gate.
      - name: Validate plugin manifests
        run: |
          node -e '
            const fs = require("fs");
            let bad = 0;
            for (const t of fs.readdirSync("plugins")) {
              const f = `plugins/${t}/polyglot-plugin.json`;
              try {
                const m = JSON.parse(fs.readFileSync(f, "utf8"));
                for (const key of ["name", "spec", "rules"])
                  if (!(key in m)) throw new Error(`missing ${key}`);
                if (!("Program" in m.rules) || !("Type" in m.rules)) throw new Error("missing Program/Type rule");
                console.log(`${f}: ok (${Object.keys(m.rules).length} rules)`);
              } catch (e) { bad++; console.error(`INVALID ${f}: ${e.message}`); }
            }
            process.exit(bad ? 1 : 0);
          '
