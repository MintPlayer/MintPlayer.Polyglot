name: Publish VS Code extension

# WORKFLOW C (PRD §4.16 / PLAN §P24). Publishes editors/vscode to the Visual Studio Marketplace AFTER a CLI
# release exists — Workflow B `gh workflow run`-DISPATCHES this once it has created the release (with the tag as
# input), so the release's assets are guaranteed present and the "referenced a tag before it existed" 404 is
# gone. NOTE: B dispatches instead of relying on `release: published` because a release created with
# GITHUB_TOKEN does NOT fire that event (GitHub's no-recursion rule — same gotcha as A→B). The
# `release: published` trigger below is kept only as a fallback for a human-created (UI) release.
#
# Platform-specific extensions: one vsix per supported RID (each embedding that RID's CLI + plugins under
# editors/vscode/bin/) plus a universal no-binary fallback; the marketplace serves the most-specific per user.
# Each leg stages the tag's CLI (stage-cli.ps1 -Tag), stamps package.json to the tag version (lockstep with the
# CLI — PRD §4.16), PACKAGES with `vsce package --target <t>` (empty on the universal leg), then hands the
# pre-built file to the publish action (HaaLeo rejects packagePath+target together, so the platform is baked at
# package time). PUBLISH_SNIPPETS is the org-wide marketplace PAT for the `mintplayer` publisher; skipDuplicate
# makes a re-run idempotent per (version, platform).

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'CLI release tag to bundle + publish, e.g. v0.5.0'
        required: true

env:
  # The release tag drives everything: which CLI to stage (by tag) and the extension version (tag minus v).
  RELEASE_TAG: ${{ github.event.release.tag_name || inputs.tag }}

jobs:
  publish:
    # D5: no extension pre-releases — hold the extension for stable tags. (On a manual dispatch there's no
    # release object, so this is vacuously true and the run proceeds.)
    if: ${{ !github.event.release.prerelease }}
    runs-on: ubuntu-latest
    permissions:
      contents: read       # gh release download (stage-cli.ps1) reads this repo's releases
    strategy:
      fail-fast: false     # one platform's marketplace hiccup shouldn't block the others
      matrix:
        include:
          - stage: win32-x64
            vscodeTarget: win32-x64
          - stage: linux-x64
            vscodeTarget: linux-x64
          - stage: linux-arm64
            vscodeTarget: linux-arm64
          - stage: darwin-x64          # macOS Intel — stages the CLI's osx-x64 archive
            vscodeTarget: darwin-x64
          - stage: darwin-arm64        # macOS Apple Silicon — stages the CLI's osx-arm64 archive
            vscodeTarget: darwin-arm64
          - stage: universal          # no-binary fallback (win-arm64 / alpine / everything else)
            vscodeTarget: ''           # empty → the action omits --target → platform-independent vsix
    name: publish (${{ matrix.stage }})
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Install dependencies
        working-directory: editors/vscode
        run: npm ci

      - name: Stamp the extension version from the release tag
        working-directory: editors/vscode
        run: |
          ver="${RELEASE_TAG#v}"
          if [ -z "$ver" ]; then echo "::error::no release tag resolved"; exit 1; fi
          npm version "$ver" --no-git-tag-version --allow-same-version
          echo "extension version stamped to $ver"

      - name: Stage the bundled CLI (${{ matrix.stage }})
        env:
          GH_TOKEN: ${{ github.token }}   # gh release download auth for this repo's release
        run: pwsh editors/vscode/scripts/stage-cli.ps1 -Target ${{ matrix.stage }} -Tag ${{ env.RELEASE_TAG }}

      # vsce bakes the platform into the vsix at PACKAGE time (`--target`), and the marketplace serves it as
      # the platform-specific package. HaaLeo rejects packagePath+target together, so we package here and hand
      # it the pre-built file. The universal leg (empty target) packages with no --target = a platform-agnostic
      # fallback vsix. `vsce package` respects .vscodeignore (keeps bin/, drops scripts/dist).
      - name: Package the VSIX (${{ matrix.stage }})
        shell: pwsh
        run: |
          $t = '${{ matrix.vscodeTarget }}'
          Push-Location editors/vscode
          try {
            if ($t) { npx --yes @vscode/vsce package --target $t --out ext.vsix }
            else    { npx --yes @vscode/vsce package --out ext.vsix }
            if ($LASTEXITCODE -ne 0) { throw "vsce package failed for '$t'" }
          } finally { Pop-Location }

      - name: Publish to Visual Studio Marketplace
        uses: HaaLeo/publish-vscode-extension@v2
        with:
          extensionFile: editors/vscode/ext.vsix   # pre-packaged; the platform is already baked in
          pat: ${{ secrets.PUBLISH_SNIPPETS }}
          skipDuplicate: true
          registryUrl: https://marketplace.visualstudio.com
